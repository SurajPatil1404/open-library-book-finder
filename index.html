<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Library Book Finder</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">📚</span>
          <span class="logo-text">BookFinder</span>
        </div>
        <div class="header-actions">
          <button class="fav-btn" id="favToggle" onclick="toggleFavView()">
            <span class="fav-icon">♥</span>
            <span>Saved</span>
            <span class="fav-count" id="favCount">0</span>
          </button>
          <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">
            🌙
          </button>
        </div>
      </div>
      <p class="header-sub">Explore millions of books via Open Library</p>
    </div>
  </header>

  <section class="search-section">
    <div class="search-wrapper">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search for a book, author, or topic..."
        autocomplete="off"
      />
      <button id="searchBtn" class="search-btn">Search</button>
    </div>
  </section>

  <!-- CONTROLS: Filter + Sort (hidden until results load) -->
  <div class="controls-bar" id="controlsBar" style="display:none;">
    <div class="controls-left">
      <span class="controls-label">Filter:</span>
      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-filter="all" onclick="setFilter('all')">All</button>
      </div>
    </div>
    <div class="controls-right">
      <span class="controls-label">Sort:</span>
      <select class="sort-select" id="sortSelect" onchange="renderBooks()">
        <option value="relevance">Relevance</option>
        <option value="title-az">Title A → Z</option>
        <option value="title-za">Title Z → A</option>
        <option value="year-new">Year (Newest)</option>
        <option value="year-old">Year (Oldest)</option>
      </select>
    </div>
  </div>

  <div class="results-info" id="resultsInfo"></div>

  <div class="loader-wrapper" id="loader">
    <div class="spinner"></div>
    <p class="loader-text">Fetching books...</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <main class="books-grid" id="booksGrid"></main>

  <div class="empty-state" id="emptyState" style="display:none;">
    <span class="empty-icon">🔍</span>
    <p>No books found. Try a different search term.</p>
  </div>

  <footer class="footer">
    <p>Powered by <a href="https://openlibrary.org" target="_blank">Open Library API</a> &nbsp;|&nbsp; Built for Individual Project</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
